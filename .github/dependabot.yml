version: 2

updates:
  # ---- GitHub Actions — routine lane (monthly, single grouped PR) --------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      actions:
        patterns:
          - "*"

  # ---- Python (uv) — routine lane (monthly, grouped along four seams) ----
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      dev-tooling:
        patterns:
          - "ruff"
          - "pyright"
          - "ty"
          - "zizmor"        # delta: repo-specific GH-Actions linter
          - "codespell"
          - "coverage"
          - "pre-commit"
          - "types-*"
      test-deps:
        patterns:
          - "pytest"
          - "pytest-*"
          - "jubilant"
          - "ops-scenario"
      docs:
        patterns:
          - "sphinx"
          - "sphinx-*"
          - "furo"
          - "myst-parser"
          - "pygments"
      runtime:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ---- Python (uv) — security-only lane (daily, ungrouped) ---------------
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 0            # security updates only
    labels:
      - "dependencies"
